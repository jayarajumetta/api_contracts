agent:
  name: qaira-semantic-compiler-platform
  version: v57
  mode: graph-completion-release

repo:
  enabled: false
  url: ""
  clone_dir: /workspace/repo
  source_subdir: ""
  default_branch: develop
  clean_clone: true
  username_env: GIT_USERNAME
  token_env: GIT_TOKEN
  execute_git: false

paths:
  source_dir: /repo
  output_dir: /output
  learning_dir: /learning
  changed_files: ""

logging:
  verbose_console: true
  verbose_files: true

runtime_execution:
  enabled: true
  max_iterations: 50
  stop_when_satisfied: true
  threshold_percent: 100
  write_iteration_snapshots: true

agent_confidence:
  enabled: true
  thresholds:
    route_discovery: 0.95
    body_detection: 0.90
    import_hydration: 0.80
    service_call_graph: 0.80
    shape_propagation: 0.80
    return_propagation: 0.80
    dto_attachment: 0.80
    test_generation: 0.90

llm:
  enabled: false
  provider: openai
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
  endpoint: https://api.openai.com/v1/chat/completions
  temperature: 0
  max_tokens: 2500
  timeout_seconds: 60
  max_retries: 2
  require_json_response: true
  allow_full_file_context: false
  allow_full_repo_context: false

llm_invocation:
  mode: selective
  enabled: false
  confidence_threshold: 0.80
  invoke_on_failure: true
  invoke_on_low_confidence: true
  invoke_on_high_confidence: false
  allowed_task_types:
    - inspect_output_file
    - inspect_source_slice
    - rerun_agent_with_config
    - add_pattern_to_learning
    - adjust_agent_config
    - mark_manual_review

framework_harvesting:
  enabled: true
  harvesters:
    openapi_files: true
    postman_files: true
    fastify_swagger: true
    nestjs_metadata: true
    fastapi_openapi: true
    spring_boot_openapi: true
    aspnet_swagger: true
    ast_comments: true
    validation_constraints: true
    runtime_swagger: false

validation_engine:
  enabled: true
  enterprise_module_resolution: true
  import_registry_hydration_fix: true
  graph_completion: true
  import_hydration_v57: true
  service_call_graph_v57: true
  shape_propagation_v57: true
  return_propagation_v57: true
  dto_attachment_v57: true
  import_aware_service_resolver: true
  export_resolver: true
  diagnostic_classifier: true

graph_completion:
  enabled: true
  import_hydration:
    enabled: true
    service_patterns:
      - "../services/*.service"
      - "./services/*.service"
      - "@/services/*.service"
      - "@api/services/*.service"
  service_call_graph:
    enabled: true
    max_depth: 4
  shape_propagation:
    enabled: true
    propagate_request_body_aliases: true
    propagate_schema_to_service: true
    propagate_service_to_repository: true
    propagate_repository_to_orm: true
  return_propagation:
    enabled: true
    sinks:
      - reply.send
      - response.send
      - res.send
      - res.json
      - return
  dto_attachment:
    enabled: true
    strategies:
      - service_signature_param_type
      - validation_wrapper_schema
      - call_graph_schema
      - local_schema_reference
      - route_handler_schema_reference
    min_similarity: 0.70

relationship_engine:
  enabled: true
  deterministic_first: true
  llm_fallback_when_confidence_below: 0.75

test_generation:
  enabled: true
  final_override_previous: true
  types:
    - postman
    - curl
    - qaira
    - rest_assured
    - playwright_api
    - k6
    - jmeter
  use_data_references: true
  use_param_references: true
  generate_extractors: true
  order_requests: true
  llm_ordering_fallback: true
  default_base_url_variable: "{{baseUrl}}"

pattern_learning:
  enabled: true

code_generation:
  enabled: false
  generate_from_worked_patterns: true
  require_llm_results_threshold: true
  min_threshold_percent: 100
  generate_patch_only: true
  apply_patch: false

git_push:
  enabled: false
  repo_url: ""
  username_env: GIT_USERNAME
  token_env: GIT_TOKEN
  target_branch: develop
  push: false
  execute_git: false

pull_request:
  enabled: false
