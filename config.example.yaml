agent:
  name: qaira-semantic-compiler-platform
  version: v55
  mode: active-iteration-runtime

repo:
  enabled: false
  url: ""
  clone_dir: /workspace/repo
  source_subdir: ""
  default_branch: develop
  clean_clone: true
  username_env: GIT_USERNAME
  token_env: GIT_TOKEN

paths:
  source_dir: /repo
  output_dir: /output
  learning_dir: /learning
  changed_files: ""

logging:
  verbose_console: true
  verbose_files: true

llm:
  enabled: false
  provider: openai
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
  endpoint: https://api.openai.com/v1/chat/completions
  temperature: 0
  max_tokens: 2500
  timeout_seconds: 60
  max_retries: 2
  require_json_response: true
  allow_full_file_context: false
  allow_full_repo_context: false

llm_iteration:
  enabled: false
  max_iterations: 50
  threshold_percent: 100
  stop_when_satisfied: true
  stage_llm_review: true
  execute_llm_suggested_tasks: true
  retry_failed_suggested_tasks: true
  allowed_task_types:
    - inspect_output_file
    - inspect_source_slice
    - rerun_agent_with_config
    - add_pattern_to_learning
    - adjust_agent_config
    - mark_manual_review
  blocked_task_types:
    - arbitrary_shell
    - network_call
    - delete_files
    - modify_source_without_code_generation_gate
    - exfiltrate_secret

llm_results_analyser:
  enabled: false
  threshold_percent: 100
  stop_when_llm_says_satisfied: true
  read_full_output_volume: true
  include_previous_iterations: true
  score_keys:
    - route_discovery_rate
    - body_detection_rate
    - body_field_known_rate
    - false_positive_get_bodies
    - actionable_unresolved_routes
    - module_resolution_rate
    - import_aware_resolution_rate
    - schema_attachment_rate
    - relationship_confidence
    - test_generation_completion

framework_harvesting:
  enabled: true
  harvesters:
    openapi_files: true
    postman_files: true
    fastify_swagger: true
    nestjs_metadata: true
    fastapi_openapi: true
    spring_boot_openapi: true
    aspnet_swagger: true
    ast_comments: true
    validation_constraints: true
    runtime_swagger: false
  runtime_swagger:
    enabled: false
    app_start_command: ""
    health_url: ""
    swagger_urls:
      - http://localhost:3000/openapi.json
      - http://localhost:3000/swagger.json
      - http://localhost:3000/api-docs

validation_engine:
  enabled: true
  import_registry_hydration_fix: true
  enterprise_module_resolution: true
  service_module_pattern_resolver: true
  import_aware_service_resolver: true
  export_resolver: true
  variable_propagation: true
  response_propagation: true
  dto_attachment: true
  diagnostic_classifier: true

relationship_engine:
  enabled: true
  deterministic_first: true
  llm_fallback_when_confidence_below: 0.75
  crud_order:
    - POST
    - GET
    - PUT
    - PATCH
    - DELETE

test_generation:
  enabled: true
  final_override_previous: true
  types:
    - postman
    - curl
    - qaira
    - rest_assured
    - playwright_api
    - k6
    - jmeter
  use_data_references: true
  use_param_references: true
  generate_extractors: true
  order_requests: true
  llm_ordering_fallback: true
  default_base_url_variable: "{{baseUrl}}"

pattern_learning:
  enabled: true
  store_worked_patterns: true
  store_failed_patterns: true
  store_llm_suggested_worked_patterns: true

code_generation:
  enabled: false
  generate_from_worked_patterns: true
  require_llm_results_threshold: true
  min_threshold_percent: 100
  generate_patch_only: true
  apply_patch: false
  allowed_paths:
    - src/
    - docs/
    - config.example.yaml
  blocked_paths:
    - .env
    - secrets/
    - credentials/
    - node_modules/
    - .git/

git_push:
  enabled: false
  repo_url: ""
  username_env: GIT_USERNAME
  token_env: GIT_TOKEN
  target_branch: develop
  create_branch_prefix: qaira-agent
  commit_message: "chore: apply QAira agent learned patterns"
  push: false

pull_request:
  enabled: false
  provider: github
  base_branch: develop
  title: "QAira agent learned pattern updates"
  body_file: /output/git/pr_body.md
