agent:
  name: qaira-semantic-compiler-platform
  version: v59
  mode: modular-orchestrated-runtime

repo:
  enabled: false
  url: ""
  clone_dir: /workspace/repo
  source_subdir: ""
  default_branch: develop
  clean_clone: true
  username_env: GIT_USERNAME
  token_env: GIT_TOKEN
  execute_git: false
  fail_open: true

paths:
  source_dir: /repo
  output_dir: /output
  learning_dir: /learning
  changed_files: ""

logging:
  verbose_console: true
  verbose_files: true
  console_heartbeat: true
  heartbeat_every_seconds: 10
  stage_start_end_logs: true
  flush_console: true
  jsonl_trace: true
  write_agent_logs: true
  log_level: INFO

scan:
  use_repository_index: true
  build_index_once: true
  exclude_dirs:
    - node_modules
    - .git
    - dist
    - build
    - coverage
    - .next
    - .cache
    - playwright-report
    - test-results
    - tmp
    - logs
  exclude_files:
    - "*.map"
    - "*.lock"
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.gif"
    - "*.mp4"
    - "*.zip"
    - "*.tar"
    - "*.gz"
  max_file_size_kb: 4096

runtime_execution:
  enabled: true
  architecture: modular_agents
  max_iterations: 3
  stop_when_satisfied: true
  threshold_percent: 100
  fail_open_on_agent_error: true
  fail_open_on_llm_error: true
  write_iteration_snapshots: true
  continue_from_last_success: true

orchestrator:
  stage_timeout_seconds: 900
  agent_timeout_seconds: 300
  continue_on_stage_failure: true
  capture_exception_trace: true
  write_stage_input_output: true
  write_stage_metrics: true
  stages:
    - repo_clone
    - repository_index
    - legacy_semantic_compiler
    - output_analyzer
    - llm_results_analyzer
    - final_test_generation
    - code_generation
    - git_commit_push

agent_confidence:
  enabled: true
  thresholds:
    repository_index: 0.90
    route_discovery: 0.95
    body_detection: 0.90
    module_resolution: 0.80
    import_aware_resolution: 0.80
    dto_attachment: 0.80
    variable_propagation: 0.80
    response_propagation: 0.80
    relationship_engine: 0.80
    test_generation: 0.90

llm:
  enabled: true
  provider: openai
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
  endpoint: https://api.openai.com/v1/chat/completions
  temperature: 0
  max_tokens: 1200
  timeout_seconds: 20
  max_retries: 1
  fail_open: true
  require_json_response: true
  allow_full_file_context: false
  allow_full_repo_context: false
  max_prompt_chars: 12000
  save_prompts: true
  save_responses: true

llm_invocation:
  mode: selective
  enabled: true
  confidence_threshold: 0.80
  invoke_on_failure: true
  invoke_on_low_confidence: true
  invoke_on_high_confidence: false
  continue_on_timeout: true
  continue_on_error: true
  max_stage_llm_calls_per_iteration: 8
  allowed_task_types:
    - inspect_output_file
    - inspect_source_slice
    - rerun_agent_with_config
    - add_pattern_to_learning
    - adjust_agent_config
    - mark_manual_review
  blocked_task_types:
    - arbitrary_shell
    - network_call
    - delete_files
    - modify_source_without_code_generation_gate
    - exfiltrate_secret

llm_results_analyser:
  enabled: true
  threshold_percent: 100
  stop_when_llm_says_satisfied: true
  read_full_output_volume: true
  include_previous_iterations: true
  continue_on_timeout: true
  continue_on_error: true

framework_harvesting:
  enabled: true
  harvesters:
    openapi_files: true
    postman_files: true
    fastify_swagger: true
    nestjs_metadata: true
    fastapi_openapi: true
    spring_boot_openapi: true
    aspnet_swagger: true
    ast_comments: true
    validation_constraints: true
    runtime_swagger: false

validation_engine:
  enabled: true
  enterprise_module_resolution: true
  import_registry_hydration_fix: true
  graph_completion: true
  import_hydration_v57: true
  service_call_graph_v57: true
  shape_propagation_v57: true
  return_propagation_v57: true
  dto_attachment_v57: true
  import_aware_service_resolver: true
  export_resolver: true
  diagnostic_classifier: true

graph_completion:
  enabled: true
  use_repository_index: true
  import_hydration:
    enabled: true
  service_call_graph:
    enabled: true
    max_depth: 4
  shape_propagation:
    enabled: true
  return_propagation:
    enabled: true
  dto_attachment:
    enabled: true
    min_similarity: 0.70

relationship_engine:
  enabled: true
  deterministic_first: true
  llm_fallback_when_confidence_below: 0.75

test_generation:
  enabled: true
  final_override_previous: true
  types:
    - postman
    - curl
    - qaira
    - rest_assured
    - playwright_api
    - k6
    - jmeter
  use_data_references: true
  use_param_references: true
  generate_extractors: true
  order_requests: true
  llm_ordering_fallback: true
  default_base_url_variable: "{{baseUrl}}"

pattern_learning:
  enabled: true
  store_worked_patterns: true
  store_failed_patterns: true
  store_llm_suggested_worked_patterns: true

code_generation:
  enabled: true
  generate_from_worked_patterns: true
  require_llm_results_threshold: true
  min_threshold_percent: 100
  generate_patch_only: true
  apply_patch: false
  fail_open: true
  allowed_paths:
    - src/
    - docs/
    - config.example.yaml
  blocked_paths:
    - .env
    - secrets/
    - credentials/
    - node_modules/
    - .git/

git_push:
  enabled: true
  repo_url: "https://github.com/jayarajumetta/api_contracts.git"
  username_env: GIT_USERNAME
  token_env: GIT_TOKEN
  target_branch: develop
  create_branch_prefix: qaira-agent
  commit_message: "chore: apply QAira agent learned patterns"
  push: false
  execute_git: false
  fail_open: true

pull_request:
  enabled: true
  provider: github
  base_branch: main
  title: "QAira agent learned pattern updates"
  body_file: /output/git/pr_body.md
  fail_open: true
